version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: veritas-db
    environment:
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
      POSTGRES_DB: veritas
    volumes:
      - ./backend/data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas -d veritas"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veritas-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - VERITAS_DATABASE_URL=postgresql://veritas:veritas@db:5432/veritas
      - VERITAS_STORAGE_DIR=/app/data/store
      - VERITAS_TIMESTAMP_DIR=/app/data/timestamps
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veritas-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
